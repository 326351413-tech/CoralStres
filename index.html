<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CoralLab – Sistema de Análisis de Estrés Coralino</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0c1f33;
color:white;
}

header{
background:#081521;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.panel{
background:#142f4a;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

h2{
margin-top:0;
color:#00bfff;
}

button{
background:#00bfff;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
font-size:15px;
}

img{
max-width:100%;
border-radius:8px;
margin-top:15px;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:15px;
}

.results{
background:#1b4468;
padding:15px;
border-radius:8px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #3e6c8e;
text-align:center;
}

canvas{
background:white;
border-radius:6px;
padding:10px;
}

footer{
text-align:center;
font-size:12px;
opacity:0.6;
padding:15px;
}

</style>

</head>

<body>

<header>
CoralLab | Monitoreo Inteligente de Estrés Coralino
</header>

<div class="container">

<div class="panel">

<h2>Cargar imagen del coral</h2>

<input type="file" id="imageInput">

<div id="imagePreview"></div>

<div class="controls">

<div>
<label>Temperatura del agua (°C)</label>
<input type="range" min="22" max="32" value="26" id="temp">
<span id="tempVal">26</span>
</div>

<div>
<label>pH del agua</label>
<input type="range" min="7" max="9" step="0.1" value="8.1" id="ph">
<span id="phVal">8.1</span>
</div>

</div>

<button onclick="analizar()">Analizar coral</button>

<div class="results" id="resultBox">
Esperando análisis...
</div>

</div>

<div class="grid">

<div class="panel">

<h2>Evolución de salud coralina</h2>
<canvas id="chart"></canvas>

</div>

<div class="panel">

<h2>Historial de análisis</h2>

<table id="historyTable">

<tr>
<th>#</th>
<th>Salud</th>
<th>Blanqueamiento</th>
<th>CSI</th>
<th>Temp</th>
<th>pH</th>
</tr>

</table>

<button onclick="exportar()">Exportar CSV</button>

</div>

</div>

</div>

<footer>
Herramienta experimental basada en indicadores de monitoreo de arrecifes
</footer>

<script>

const temp=document.getElementById("temp")
const ph=document.getElementById("ph")

const tempVal=document.getElementById("tempVal")
const phVal=document.getElementById("phVal")

temp.oninput=()=>tempVal.innerText=temp.value
ph.oninput=()=>phVal.innerText=ph.value

let history=JSON.parse(localStorage.getItem("coralHistory"))||[]

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Índice de salud",
data:[],
borderColor:"blue",
fill:false
}]
},
options:{
scales:{
y:{
min:0,
max:100
}
}
}
})

document.getElementById("imageInput").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(event){

document.getElementById("imagePreview").innerHTML=
`<img id="coralImg" src="${event.target.result}">`

}

reader.readAsDataURL(file)

})

function analizar(){

const img=document.getElementById("coralImg")

if(!img){
alert("Sube una imagen primero")
return
}

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data

let pale=0
let colorful=0
let brightnessTotal=0

let total=data.length/4

for(let i=0;i<data.length;i+=4){

let r=data[i]/255
let g=data[i+1]/255
let b=data[i+2]/255

let max=Math.max(r,g,b)
let min=Math.min(r,g,b)

let brightness=max
let saturation=max===0?0:(max-min)/max

brightnessTotal+=brightness

if(brightness>0.7 && saturation<0.25){
pale++
}

if(saturation>0.35){
colorful++
}

}

let bleaching=(pale/total)*100
let pigmentLoss=100-(colorful/total)*100

const t=parseFloat(temp.value)
const p=parseFloat(ph.value)

let envStress=0

if(t>27)envStress+=10
if(t>28)envStress+=15
if(t>30)envStress+=25

if(p<7.9)envStress+=15
if(p<7.7)envStress+=20
if(p>8.4)envStress+=10

let health=100

health-=bleaching*0.6
health-=pigmentLoss*0.3
health-=envStress

health=Math.max(0,Math.min(100,Math.round(health)))

let csi=100-health

let estado=""

if(health>80) estado="Coral saludable"
else if(health>60) estado="Estrés leve"
else if(health>40) estado="Estrés moderado"
else if(health>20) estado="Blanqueamiento severo"
else estado="Colapso coralino"

document.getElementById("resultBox").innerHTML=`

<b>Estado del coral:</b> ${estado}<br><br>

<b>Salud estimada:</b> ${health}%<br>
<b>Blanqueamiento:</b> ${Math.round(bleaching)}%<br>
<b>Pérdida de pigmentación:</b> ${Math.round(pigmentLoss)}%<br>
<b>Coral Stress Index:</b> ${csi}<br><br>

<b>Temperatura:</b> ${t}°C<br>
<b>pH:</b> ${p}

`

const registro={
salud:health,
bleach:Math.round(bleaching),
csi:csi,
temp:t,
ph:p
}

history.push(registro)

localStorage.setItem("coralHistory",JSON.stringify(history))

actualizar()

}

function actualizar(){

chart.data.labels=history.map((_,i)=>i+1)
chart.data.datasets[0].data=history.map(x=>x.salud)

chart.update()

const table=document.getElementById("historyTable")

table.innerHTML=`
<tr>
<th>#</th>
<th>Salud</th>
<th>Blanqueamiento</th>
<th>CSI</th>
<th>Temp</th>
<th>pH</th>
</tr>
`

history.forEach((h,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${h.salud}%</td>
<td>${h.bleach}%</td>
<td>${h.csi}</td>
<td>${h.temp}</td>
<td>${h.ph}</td>
</tr>
`

})

}

function exportar(){

let csv="Analisis,Salud,Blanqueamiento,CSI,Temp,pH\n"

history.forEach((h,i)=>{
csv+=`${i+1},${h.salud},${h.bleach},${h.csi},${h.temp},${h.ph}\n`
})

const blob=new Blob([csv],{type:"text/csv"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="coral_datos.csv"
a.click()

}

actualizar()

</script>

</body>
</html>
