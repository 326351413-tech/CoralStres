<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CoralLab - Sistema de Análisis de Estrés Coralino</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0b1c2c;
--panel:#132f4c;
--panel2:#1b4266;
--accent:#00b4ff;
--text:#eaf6ff;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI,Arial;
background:var(--bg);
color:var(--text);
}

header{
background:#081420;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.panel{
background:var(--panel);
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

h2{
margin-top:0;
color:var(--accent);
}

input[type=file]{
margin-top:10px;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:15px;
}

.control label{
display:block;
margin-bottom:5px;
}

.control input{
width:100%;
}

button{
background:var(--accent);
border:none;
padding:12px 20px;
border-radius:6px;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

button:hover{
opacity:0.9;
}

img{
max-width:100%;
border-radius:8px;
margin-top:15px;
}

.results{
background:var(--panel2);
padding:15px;
border-radius:8px;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

canvas{
background:white;
border-radius:8px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #335a7c;
}

footer{
text-align:center;
font-size:12px;
opacity:0.6;
padding:15px;
}

</style>

</head>

<body>

<header>
CoralLab | Sistema Inteligente de Monitoreo de Estrés Coralino
</header>

<div class="container">

<div class="panel">

<h2>1. Cargar Imagen del Coral</h2>

<input type="file" id="imageInput">

<div id="imagePreview"></div>

<div class="controls">

<div class="control">
<label>Temperatura del agua (°C)</label>
<input type="range" min="22" max="32" value="26" id="temp">
<span id="tempVal">26</span>
</div>

<div class="control">
<label>pH del agua</label>
<input type="range" min="7" max="9" step="0.1" value="8.1" id="ph">
<span id="phVal">8.1</span>
</div>

</div>

<button onclick="analizar()">Ejecutar Análisis</button>

<div class="results" id="resultBox">
Esperando análisis...
</div>

</div>

<div class="grid">

<div class="panel">

<h2>2. Evolución de Salud Coralina</h2>

<canvas id="healthChart"></canvas>

</div>

<div class="panel">

<h2>3. Historial de Análisis</h2>

<table id="historyTable">
<tr>
<th>#</th>
<th>Salud</th>
<th>Blanqueamiento</th>
<th>CSI</th>
<th>Temp</th>
<th>pH</th>
</tr>
</table>

<button onclick="exportar()">Exportar Datos CSV</button>

</div>

</div>

</div>

<footer>
Herramienta experimental para monitoreo temprano del estrés coralino
</footer>

<script>

const temp=document.getElementById("temp")
const ph=document.getElementById("ph")

const tempVal=document.getElementById("tempVal")
const phVal=document.getElementById("phVal")

temp.oninput=()=>tempVal.innerText=temp.value
ph.oninput=()=>phVal.innerText=ph.value

let history=JSON.parse(localStorage.getItem("coralHistory"))||[]

const chart=new Chart(document.getElementById("healthChart"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Índice de salud",
data:[],
borderColor:"blue",
fill:false,
tension:0.2
}]
},
options:{
scales:{
y:{
min:0,
max:100
}
}
}
})

document.getElementById("imageInput").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(event){

document.getElementById("imagePreview").innerHTML=
`<img id="coralImg" src="${event.target.result}">`

}

reader.readAsDataURL(file)

})

function analizarImagen(){

const img=document.getElementById("coralImg")

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data

let white=0
let total=data.length/4

for(let i=0;i<data.length;i+=4){

let r=data[i]
let g=data[i+1]
let b=data[i+2]

if(r>200 && g>200 && b>200){
white++
}

}

return Math.round((white/total)*100)

}

function identificar(blanqueamiento){

if(blanqueamiento<20) return "Acropora (probable)"
if(blanqueamiento<40) return "Staghorn coral (probable)"
if(blanqueamiento<60) return "Brain coral (probable)"
return "Coral severamente blanqueado"

}

function calcularCSI(temp,ph,bleach){

let score=0

score+=Math.abs(temp-26)*5
score+=Math.abs(ph-8.1)*20
score+=bleach*0.6

return Math.round(Math.min(score,100))

}

function analizar(){

const img=document.getElementById("coralImg")

if(!img){
alert("Primero debes subir una imagen del coral")
return
}

const bleaching=analizarImagen()

let salud=100

const t=parseFloat(temp.value)
const p=parseFloat(ph.value)

if(t>28)salud-=20
if(t>30)salud-=30
if(p<7.8)salud-=20
if(p>8.5)salud-=10

salud-=bleaching*0.5

salud=Math.max(0,Math.round(salud))

const especie=identificar(bleaching)

const csi=calcularCSI(t,p,bleaching)

document.getElementById("resultBox").innerHTML=`

<b>Índice de salud:</b> ${salud}%<br>
<b>Blanqueamiento estimado:</b> ${bleaching}%<br>
<b>Coral Stress Index (CSI):</b> ${csi}<br>
<b>Especie probable:</b> ${especie}<br>
<b>Temperatura:</b> ${t}°C<br>
<b>pH:</b> ${p}

`

const registro={
salud:salud,
bleach:bleaching,
csi:csi,
temp:t,
ph:p
}

history.push(registro)

localStorage.setItem("coralHistory",JSON.stringify(history))

actualizar()

}

function actualizar(){

chart.data.labels=history.map((_,i)=>i+1)
chart.data.datasets[0].data=history.map(x=>x.salud)

chart.update()

const table=document.getElementById("historyTable")

table.innerHTML=`
<tr>
<th>#</th>
<th>Salud</th>
<th>Blanqueamiento</th>
<th>CSI</th>
<th>Temp</th>
<th>pH</th>
</tr>
`

history.forEach((h,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${h.salud}%</td>
<td>${h.bleach}%</td>
<td>${h.csi}</td>
<td>${h.temp}</td>
<td>${h.ph}</td>
</tr>
`

})

}

function exportar(){

let csv="Analisis,Salud,Blanqueamiento,CSI,Temp,pH\n"

history.forEach((h,i)=>{
csv+=`${i+1},${h.salud},${h.bleach},${h.csi},${h.temp},${h.ph}\n`
})

const blob=new Blob([csv],{type:"text/csv"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="coral_datos.csv"
a.click()

}

actualizar()

</script>

</body>

</html>
